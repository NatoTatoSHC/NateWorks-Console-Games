<!DOCTYPE html>
<html>
    <head>
        <script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
        <script src="https://unpkg.com/jquery.terminal@2.x.x/js/jquery.terminal.min.js"></script>
        <link rel="stylesheet" href="https://unpkg.com/jquery.terminal@2.x.x/css/jquery.terminal.min.css" />
    </head>
    <body style="height: 100%;">
        <div id="terminal" style="width: 100%; height: 100%;">
            <template id="greet">
  _   _       _    __          __        _           _____                           
 | \ | |     | |   \ \        / /       | |         / ____|

Type "games all" to start                                                                      
        </template>
        </div>
        <script src="./brain_games.js"></script>
        <script src="./arcade_games.js"></script>
        <script>
            $(function () {
                function save(info, id) {
                    localStorage.setItem(id, info);
                }
                function load(id) {
                    return localStorage.getItem(id);
                }

                var games = {
                    "puzzle":{
                        "Wordle":{
                            "play":function(term) {
                                term.echo("Now Playing Wordle")
                            }
                        }
                    },
                    "brain":{
                        "Trivia":trivia
                    },
                    "arcade":{
                        "HashtagEater": hashtagEater,
                        "BombDodger": bombDodger
                    },
                    "math":{
                        "Add":{
                            "play": function(term, id) {
                                term.read("Number of digit to add up to: ").then(async digits => {
                                    term.echo();
                                    while (true) {
                                        let num1 = Math.round(Math.random()*Number("9".repeat(Number(digits))));
                                        let num2 = Math.round(Math.random()*Number("9".repeat(Number(digits))));
                                        let answer = num1 + num2;
                                        await term.read(`${num1} + ${num2} = `).then(ans => {
                                            if (answer == ans) {
                                                term.echo("Correct");
                                            } else {
                                                term.echo("Incorrect");
                                            }
                                        });
                                        term.echo();
                                        let exit = false;
                                        await term.read("Would you like another (Y/N): ").then(v => {
                                            if (v.toLowerCase() != "y") {
                                                exit = true;
                                            }
                                        });
                                        if (exit) {
                                            break;
                                        }
                                        term.echo();
                                    }
                                });
                            }
                        }
                    },
                    "import":{}
                }
                $("#terminal").terminal({
                    "games": function (category) {
                        this.echo()
                        if (category == "all") {
                            Object.keys(games).forEach(cat => {
                                Object.keys(games[cat]).forEach(game => {
                                    this.echo(game + " ------- Id: " + cat+"."+game)
                                })
                            })
                        } else if (!games[category]) {
                            this.error("Catergory Does Not exist");
                            return
                            
                        } else {
                            Object.keys(games[category]).forEach(game => {
                                this.echo(game + " ------- Id: " + category+"."+game)
                            });
                        }
                        this.echo()
                        this.echo("Type \"play <enter id here>\" to play a game.")
                    },

                    "play": function (id) {
                        const gamePathRegEx = /.+\..+/;
                        if (! id.match(gamePathRegEx)) {
                            this.error(id + " is not a valid game path (catergory.Game)")
                            return;
                        }
                        var gamePath = id.split(".");
                        if (!games[gamePath[0]]) {
                            this.error("Category "+gamePath[0]+" does not exist");
                            return
                        }
                        if (!games[gamePath[0]][gamePath[1]]) {
                            this.error("Game "+gamePath[1]+" does not exist in category "+gamePath[0]);
                            return
                        }
                        this.clear();
                        this.echo("Now Playing "+gamePath[1]+"\n");
                        games[gamePath[0]][gamePath[1]].play(this, id)
                    },
                    "import": async function(name, url) {
                        let res = await fetch(url);
                        if (res.ok != true) {
                            this.error(); //ADD MSG
                            return
                        }
                        let info = await res.text();
                        eval(info);
                        games.import[name] = getData();
                    }
                },{
                    "greetings":greet.innerHTML
                })
            })
        </script>
    </body>
</html>
